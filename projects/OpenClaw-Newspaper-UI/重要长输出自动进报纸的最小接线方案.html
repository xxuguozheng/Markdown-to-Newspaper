    <div class="summary">把主代理 finalize 产出的重要长回答，经一层 runtime helper 判定后，命中则发布到报纸并把摘要加链接回到聊天。</div>
    <article class="body"><article><h1>重要长输出自动进报纸的最小接线方案</h1><p>主代理在 finalize 阶段产出完整长回答后，先交给 runtime helper 做归档判定。</p><h2>命中时</h2><p>helper 生成 PublishRequest，调用 publish_to_newspaper，并返回摘要加链接。</p><h2>未命中时</h2><p>保留普通聊天直出，不走报纸。</p></article></article>
