<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="refresh" content="0; url=/site/index.html" />
  <title>OpenClaw Newspaper</title>
  <style>
    :root { --paper:#f5f1e8; --ink:#171717; --muted:#666055; --accent:#7f1111; --sans:"Inter","PingFang SC","Noto Sans CJK SC",sans-serif; --serif:"Source Han Serif SC","Songti SC","STSong",serif; }
    * { box-sizing:border-box; }
    body { margin:0; min-height:100vh; display:grid; place-items:center; background:#ddd6c8; color:var(--ink); font-family:var(--serif); }
    main { width:min(760px, calc(100vw - 32px)); padding:28px; background:var(--paper); border-top:4px solid var(--accent); box-shadow:0 12px 34px rgba(0,0,0,.12); }
    small { display:block; font:11px/1.4 var(--sans); text-transform:uppercase; letter-spacing:.1em; color:var(--muted); margin-bottom:8px; }
    h1 { margin:0 0 10px; font-size:clamp(30px, 5vw, 48px); line-height:1; }
    p { margin:0 0 14px; font:14px/1.7 var(--sans); color:#2b251f; }
    .links { display:flex; flex-wrap:wrap; gap:10px; }
    a { display:inline-flex; align-items:center; min-height:38px; padding:0 14px; background:#171717; color:#f5f1e8; text-decoration:none; font:700 12px/1.2 var(--sans); letter-spacing:.04em; }
    a.secondary { background:rgba(255,255,255,.72); color:#2b251f; border:1px solid rgba(0,0,0,.14); }
  </style>
</head>
<body>
  <main>
    <small>OpenClaw Newspaper Portal</small>
    <h1>正在跳转到项目门户</h1>
    <p>如果浏览器没有自动跳转，请手动进入项目门户或直接打开 OpenClaw 报纸系统项目页。</p>
    <div class="links">
      <a href="/site/index.html">进入项目门户</a>
      <a class="secondary" href="/projects/OpenClaw-Newspaper-UI/index.html">打开报纸系统项目页</a>
    </div>
  </main>
</body>
</html>
