<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>$title</title>
  <style>
    :root { --paper:#f5f1e8; --ink:#171717; --muted:#666055; --accent:$accent; --sans:"Inter","PingFang SC","Noto Sans CJK SC",sans-serif; --serif:"Source Han Serif SC","Songti SC","STSong",serif; }
    * { box-sizing:border-box; }
    html { scroll-behavior:smooth; }
    body { margin:0; background:var(--paper); color:var(--ink); font-family:var(--serif); }
    a { color:inherit; }
    .page { width:100%; min-height:100vh; padding:0; background:var(--paper); }
    .stream { width:100%; padding:0 0 24px; }
    .edition { width:100%; margin:0; padding:0 0 18px; border-bottom:1px solid rgba(23,23,23,.10); }
    .edition:last-child { border-bottom:none; padding-bottom:4px; }
    .edition-head { max-width:1200px; margin:0 auto; padding:46px 28px 16px; display:grid; grid-template-columns:minmax(0,1fr) minmax(320px,.7fr); gap:16px; }
    .edition-meta small, .edition-meta span { display:block; font:11px/1.45 var(--sans); color:var(--muted); text-transform:uppercase; letter-spacing:.06em; }
    .edition-meta b { display:block; margin:4px 0 6px; font:900 24px/1.04 var(--serif); }
    .edition-head p { margin:0; font:13px/1.68 var(--sans); color:#2b251f; align-self:end; }
    .edition-frame { width:100%; border:none; display:block; background:transparent; min-height:680px; }
    .hover-panel { position:fixed; top:0; bottom:0; width:min(340px, calc(100vw - 34px)); z-index:80; transition:transform .22s ease, opacity .22s ease; opacity:.12; }
    .hover-panel .panel-inner { height:100%; overflow:auto; background:rgba(245,241,232,.985); box-shadow:0 18px 42px rgba(0,0,0,.16); padding:14px 12px 18px; }
    .hover-panel h3 { margin:0 0 10px; font:800 12px/1.3 var(--sans); letter-spacing:.08em; text-transform:uppercase; color:var(--accent); }
    .hover-panel-left { left:0; transform:translateX(calc(-100% + 16px)); }
    .hover-panel-left:hover { transform:translateX(0); opacity:1; }
    .hover-panel-right { right:0; transform:translateX(calc(100% - 16px)); }
    .hover-panel-right:hover { transform:translateX(0); opacity:1; }
    .hover-bar-top { position:fixed; left:50%; top:0; transform:translate(-50%, calc(-100% + 16px)); width:min(1180px, calc(100vw - 40px)); z-index:90; transition:transform .22s ease, opacity .22s ease; opacity:.12; }
    .hover-bar-top:hover { transform:translate(-50%, 0); opacity:1; }
    .hover-bar-top .bar-inner { background:rgba(245,241,232,.985); box-shadow:0 18px 42px rgba(0,0,0,.16); padding:10px 12px; }
    .bar-title { font:800 10px/1.3 var(--sans); letter-spacing:.12em; text-transform:uppercase; color:var(--accent); margin-bottom:8px; }
    .project-switches { display:flex; flex-wrap:wrap; gap:8px; }
    .project-switch { display:inline-flex; align-items:center; min-height:34px; padding:0 12px; background:rgba(255,255,255,.62); color:#2b251f; text-decoration:none; font:700 12px/1.2 var(--sans); }
    .project-switch.is-active { background:#171717; color:#f5f1e8; }
    .preview-strip { max-width:1200px; margin:72px auto 16px; padding:16px 18px; display:grid; grid-template-columns:minmax(0,1fr) auto; gap:16px; background:linear-gradient(90deg, rgba(127,17,17,.08), rgba(255,255,255,.68)); border-top:4px solid var(--accent); box-shadow:0 12px 30px rgba(0,0,0,.08); }
    .preview-strip small { display:block; font:11px/1.4 var(--sans); color:var(--muted); text-transform:uppercase; letter-spacing:.08em; margin-bottom:4px; }
    .preview-strip b { display:block; font:900 20px/1.2 var(--serif); margin-bottom:6px; }
    .preview-strip p { margin:0; font:13px/1.68 var(--sans); color:#2b251f; }
    .preview-links { display:flex; flex-wrap:wrap; gap:8px; align-content:start; justify-content:flex-end; }
    .preview-link { display:inline-flex; align-items:center; justify-content:center; min-height:38px; padding:0 12px; border:1px solid rgba(0,0,0,.2); background:rgba(255,255,255,.72); color:#2b251f; text-decoration:none; font:700 12px/1.2 var(--sans); letter-spacing:.04em; }
    .preview-link.is-strong { background:#171717; color:#f5f1e8; border-color:#171717; }
    .backlink { display:inline-flex; align-items:center; justify-content:center; min-height:36px; padding:0 12px; background:rgba(255,255,255,.62); font:700 12px/1.2 var(--sans); letter-spacing:.04em; text-transform:uppercase; color:#2b251f; text-decoration:none; margin-bottom:10px; }
    .editor-card { background:rgba(255,255,255,.58); padding:12px 12px 11px; margin-bottom:10px; border-left:3px solid color-mix(in srgb, var(--accent) 40%, transparent); }
    .editor-card small { display:block; font:11px/1.4 var(--sans); color:var(--muted); margin-bottom:4px; letter-spacing:.04em; text-transform:uppercase; }
    .editor-card b { display:block; font:700 15px/1.42 var(--sans); margin-bottom:6px; color:#1f1a15; }
    .editor-card p { margin:0; font:13px/1.68 var(--sans); color:#2b251f; }
    .editor-card .follow { margin-top:8px; padding-top:8px; border-top:1px solid rgba(0,0,0,.10); }
    .editor-lead b { font-size:18px; }
    .editor-inline b { font-size:13px; }
    .side-link { display:block; background:rgba(255,255,255,.58); padding:10px 11px; color:inherit; text-decoration:none; margin-bottom:8px; }
    .side-link small, .side-link span { display:block; font:11px/1.45 var(--sans); color:var(--muted); }
    .side-link b { display:block; font:700 13px/1.42 var(--sans); margin:4px 0; }
    .empty { padding:14px; font:13px/1.6 var(--sans); color:var(--muted); background:rgba(255,255,255,.35); }
    .portal-page { max-width:1360px; margin:18px auto; background:var(--paper); border:1px solid rgba(0,0,0,.18); box-shadow:0 12px 36px rgba(0,0,0,.18); padding:20px 24px 26px; }
    .masthead { border-bottom:4px double #1f1f1f; padding-bottom:10px; margin-bottom:20px; display:grid; grid-template-columns:minmax(0,1.4fr) minmax(260px,.8fr); gap:18px; }
    .topline { font:10px/1.35 var(--sans); letter-spacing:.09em; text-transform:uppercase; color:var(--muted); margin-bottom:6px; }
    .portal-page h1 { margin:0; font-size:clamp(34px,4.8vw,58px); line-height:.94; }
    .dek { margin-top:8px; font-size:16px; line-height:1.58; max-width:920px; }
    .hero-meta { display:grid; gap:10px; align-content:start; }
    .hero-chip { background:rgba(255,255,255,.56); padding:12px 14px; }
    .hero-chip small { display:block; font:11px/1.4 var(--sans); color:var(--muted); margin-bottom:4px; }
    .hero-chip b { display:block; font:700 14px/1.45 var(--sans); }
    .grid { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:18px; }
    .project-card { display:block; color:inherit; text-decoration:none; background:linear-gradient(180deg, rgba(255,255,255,.44), rgba(255,255,255,.20)); box-shadow:0 10px 24px rgba(0,0,0,.06); padding:20px 20px 18px; }
    .card-top,.card-meta { display:flex; justify-content:space-between; gap:12px; font:11px/1.4 var(--sans); color:var(--muted); text-transform:uppercase; letter-spacing:.06em; }
    .project-card h2 { margin:12px 0 10px; font-size:clamp(26px,3vw,40px); line-height:1.02; }
    .project-card p { margin:0 0 14px; font:14px/1.66 var(--sans); color:#2b251f; }
    .footer { margin-top:18px; padding-top:10px; border-top:3px double #1f1f1f; font:10px/1.5 var(--sans); color:var(--muted); }
    @media (max-width: 1080px) {
      .hover-panel { width:min(288px, calc(100vw - 22px)); }
      .hover-bar-top { width:calc(100vw - 24px); }
      .edition-head { grid-template-columns:1fr; padding:40px 18px 14px; }
      .preview-strip { margin:64px 18px 16px; grid-template-columns:1fr; }
      .preview-links { justify-content:flex-start; }
    }
    @media (max-width: 980px) {
      .masthead { grid-template-columns:1fr; }
      .grid { grid-template-columns:1fr; }
    }
  </style>
</head>
<body>
$body
$script
</body>
</html>
