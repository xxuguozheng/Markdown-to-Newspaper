<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zep</title>
  <style>
    :root { --paper:#f5f1e8; --ink:#171717; --muted:#666055; --accent:#7f1111; --sans:"Inter","PingFang SC","Noto Sans CJK SC",sans-serif; --serif:"Source Han Serif SC","Songti SC","STSong",serif; }
    * { box-sizing:border-box; } html { scroll-behavior:smooth; } body { margin:0; background:var(--paper); color:var(--ink); font-family:var(--serif); }
    .page { width:100%; min-height:100vh; padding:0; background:var(--paper); } .stream { width:100%; padding:0 0 24px; }
    .edition { width:100%; margin:0; padding:0 0 18px; border-bottom:1px solid rgba(23,23,23,.10); } .edition:last-child { border-bottom:none; padding-bottom:4px; }
    .edition-head { max-width:1200px; margin:0 auto; padding:46px 28px 16px; display:grid; grid-template-columns:minmax(0,1fr) minmax(320px,.7fr); gap:16px; }
    .edition-meta small, .edition-meta span { display:block; font:11px/1.45 var(--sans); color:var(--muted); text-transform:uppercase; letter-spacing:.06em; }
    .edition-meta b { display:block; margin:4px 0 6px; font:900 24px/1.04 var(--serif); }
    .edition-head p { margin:0; font:13px/1.68 var(--sans); color:#2b251f; align-self:end; }
    .edition-frame { width:100%; border:none; display:block; background:transparent; min-height:680px; }
    .hover-panel { position:fixed; top:0; bottom:0; width:min(340px, calc(100vw - 34px)); z-index:80; transition:transform .22s ease, opacity .22s ease; opacity:.12; }
    .hover-panel .panel-inner { height:100%; overflow:auto; background:rgba(245,241,232,.985); box-shadow:0 18px 42px rgba(0,0,0,.16); padding:14px 12px 18px; }
    .hover-panel h3 { margin:0 0 10px; font:800 12px/1.3 var(--sans); letter-spacing:.08em; text-transform:uppercase; color:var(--accent); }
    .hover-panel-left { left:0; transform:translateX(calc(-100% + 16px)); } .hover-panel-left:hover { transform:translateX(0); opacity:1; }
    .hover-panel-right { right:0; transform:translateX(calc(100% - 16px)); } .hover-panel-right:hover { transform:translateX(0); opacity:1; }
    .hover-bar-top { position:fixed; left:50%; top:0; transform:translate(-50%, calc(-100% + 16px)); width:min(1180px, calc(100vw - 40px)); z-index:90; transition:transform .22s ease, opacity .22s ease; opacity:.12; }
    .hover-bar-top:hover { transform:translate(-50%, 0); opacity:1; } .hover-bar-top .bar-inner { background:rgba(245,241,232,.985); box-shadow:0 18px 42px rgba(0,0,0,.16); padding:10px 12px; }
    .bar-title { font:800 10px/1.3 var(--sans); letter-spacing:.12em; text-transform:uppercase; color:var(--accent); margin-bottom:8px; }
    .project-switches { display:flex; flex-wrap:wrap; gap:8px; } .project-switch { display:inline-flex; align-items:center; min-height:34px; padding:0 12px; background:rgba(255,255,255,.62); color:#2b251f; text-decoration:none; font:700 12px/1.2 var(--sans); } .project-switch.is-active { background:#171717; color:#f5f1e8; }
    .backlink { display:inline-flex; align-items:center; justify-content:center; min-height:36px; padding:0 12px; background:rgba(255,255,255,.62); font:700 12px/1.2 var(--sans); text-transform:uppercase; color:#2b251f; text-decoration:none; margin-bottom:10px; }
    .editor-card { background:rgba(255,255,255,.58); padding:12px 12px 11px; margin-bottom:10px; border-left:3px solid rgba(127,17,17,.34); }
    .editor-card small { display:block; font:11px/1.4 var(--sans); color:var(--muted); margin-bottom:4px; text-transform:uppercase; } .editor-card b { display:block; font:700 15px/1.42 var(--sans); margin-bottom:6px; color:#1f1a15; } .editor-card p { margin:0; font:13px/1.68 var(--sans); color:#2b251f; }
    .editor-card .follow { margin-top:8px; padding-top:8px; border-top:1px solid rgba(0,0,0,.10); } .editor-lead b { font-size:18px; } .editor-inline b { font-size:13px; }
    .side-link { display:block; background:rgba(255,255,255,.58); padding:10px 11px; color:inherit; text-decoration:none; margin-bottom:8px; } .side-link small, .side-link span { display:block; font:11px/1.45 var(--sans); color:var(--muted); } .side-link b { display:block; font:700 13px/1.42 var(--sans); margin:4px 0; }
    @media (max-width: 1080px) { .hover-panel { width:min(288px, calc(100vw - 22px)); } .hover-bar-top { width:calc(100vw - 24px); } .edition-head { grid-template-columns:1fr; padding:40px 18px 14px; } }
  </style>
</head>
<body>

  <aside class="hover-panel hover-panel-left" aria-label="项目摘要栏"><div class="panel-inner">
    <a class="backlink" href="/site/index.html">← 返回项目列表</a>
    <h3>项目摘要</h3>
    <section class="editor-card editor-lead"><small>本项目</small><b>Zep</b><p>Zep 相关本地记忆接入与路线验证项目位。</p></section>

  </div></aside>
  <aside class="hover-panel hover-panel-right" aria-label="版次目录"><div class="panel-inner"><h3>版次目录</h3></div></aside>
  <main class="page">
    <section class="stream"></section>
  </main>
  <script>
    (() => {
      const frames = Array.from(document.querySelectorAll('.edition-frame'));
      const setHeight = (frame) => {
        try {
          const doc = frame.contentDocument || frame.contentWindow?.document;
          if (!doc) return;
          const body = doc.body; const html = doc.documentElement;
          if (!body || !html) return;
          const height = Math.max(body.scrollHeight, body.offsetHeight, html.clientHeight, html.scrollHeight, html.offsetHeight);
          if (height > 0) frame.style.height = `${height}px`;
        } catch (err) {
          const density = frame.dataset.editionDensity || 'brief';
          frame.style.height = density === 'longform' ? '1500px' : '920px';
        }
      };
      frames.forEach((frame) => { frame.addEventListener('load', () => setHeight(frame)); setTimeout(() => setHeight(frame), 180); setTimeout(() => setHeight(frame), 800); });
      window.addEventListener('resize', () => frames.forEach(setHeight));
    })();
  </script>
</body>
</html>
